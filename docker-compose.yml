services:
  coding-module-api:
    build: .
    container_name: coding_module_api
    restart: always
    ports:
      - "8000:8000"
    volumes:
      # Map docker.sock so the container can spin up sibling containers for testing
      - /var/run/docker.sock:/var/run/docker.sock
      # Map the workspaces directory so files are accessible on the host
      - ./.workspaces:/app/.workspaces
    env_file:
      - .env
